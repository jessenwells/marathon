<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cast receiver</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      cast-media-player {
        display: block;
        box-sizing: border-box;
        width: 100%;
        height: 100%;
        overflow: hidden;
        position: relative;
        --next-preview-visibility: hidden;
      }
    </style>
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  </head>
  <body>
    <cast-media-player></cast-media-player>
    <script>
      /*
        Aspect fix (some Chromecast + cast-media-player builds distort <video>
        when it is boxed with width and height both 100%). Together:
        — Shadow CSS: max-width/max-height + object-fit:contain + auto w/h,
          wrappers full viewport + flex center.
        — loadedmetadata: aspect-ratio from videoWidth / videoHeight.
      */
      (function () {
        var SHADOW_CSS = [
          "[class*=video-container],",
          "[class*=embed-player],",
          "[class*=shaka-video-container]{",
          "width:100%!important;height:100%!important;",
          "min-height:0!important;",
          "box-sizing:border-box!important;",
          "display:flex!important;",
          "align-items:center!important;",
          "justify-content:center!important;",
          "}",
          "video{",
          "object-fit:contain!important;",
          "object-position:center!important;",
          "width:auto!important;",
          "height:auto!important;",
          "max-width:100%!important;",
          "max-height:100%!important;",
          "flex:0 0 auto!important;",
          "}",
        ].join("");

        function shadowStyleEnsure(root) {
          if (!root) return;
          var el = root.querySelector("[data-cast-rcv-aspect-fix]");
          if (!el) {
            el = document.createElement("style");
            el.setAttribute("data-cast-rcv-aspect-fix", "1");
            root.insertBefore(el, root.firstChild);
          }
          el.textContent = SHADOW_CSS;
        }

        function bindVideoAspectFromDecoder(video) {
          if (!video || video.__castRcAspectRx) return;
          video.__castRcAspectRx = true;

          function sync() {
            var w = video.videoWidth;
            var h = video.videoHeight;
            if (w && h) video.style.aspectRatio = w + " / " + h;
          }

          video.addEventListener("loadedmetadata", sync);
          video.addEventListener("emptied", function () {
            video.style.aspectRatio = "";
          });
          if (video.readyState >= 1) sync();
        }

        function walkShadows(root, fn) {
          if (!root) return;
          fn(root);
          root.querySelectorAll("*").forEach(function (n) {
            if (n.shadowRoot) walkShadows(n.shadowRoot, fn);
          });
        }

        function applyPlaybackAspectFix() {
          var cmp = document.querySelector("cast-media-player");
          if (!cmp || !cmp.shadowRoot) return;
          walkShadows(cmp.shadowRoot, function (sh) {
            shadowStyleEnsure(sh);
            sh.querySelectorAll("video").forEach(bindVideoAspectFromDecoder);
          });
        }

        var cmp = document.querySelector("cast-media-player");
        if (cmp) {
          (function attachObserverWhenShadowReady() {
            function tick() {
              if (cmp.shadowRoot) {
                applyPlaybackAspectFix();
                new MutationObserver(applyPlaybackAspectFix).observe(
                  cmp.shadowRoot,
                  { subtree: true, childList: true }
                );
              } else {
                requestAnimationFrame(tick);
              }
            }
            tick();
          })();
        }

        var ctx = cast.framework.CastReceiverContext.getInstance();
        var pm = ctx.getPlayerManager();
        var Et = cast.framework.events.EventType;

        pm.addEventListener(Et.PLAYER_LOAD_COMPLETE, function () {
          requestAnimationFrame(applyPlaybackAspectFix);
        });
        pm.addEventListener(Et.PLAYING, function () {
          requestAnimationFrame(applyPlaybackAspectFix);
        });

        ctx.start();
      })();
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cast receiver</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    cast-media-player {
      display: block;
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      position: relative;
      /* background-size: cover; */
      --watermark-position: bottom left;
      --theme-hue: 200;
      --next-preview-visibility: hidden;
      --media-artwork-visibility: hidden;
      --watermark-image: url('https://firebasestorage.googleapis.com/v0/b/maryhartman-project.appspot.com/o/assets%2Fwatermark.png?alt=media');
      --watermark-size: 65px;
      /* --background-image: url('https://firebasestorage.googleapis.com/v0/b/maryhartman-project.appspot.com/o/assets%2Fmary-hartman-cover-wide.webp?alt=media'); */
    }
  </style>
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
</head>

<body>
  <cast-media-player></cast-media-player>
  <script>
    cast.framework.CastReceiverContext.getInstance().start();
  </script>
</body>

</html>

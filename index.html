<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- No mobile viewport: Google's CastReceiver sample omits it; width=device-width
         can skew layout on Cast/TV and distort the player aspect ratio. -->
    <title>Cast receiver</title>
    <!-- Match googlecast/CastReceiver: no explicit width/height on cast-media-player.
         Forcing 100% + position:fixed can skew non-standard frames (e.g. 920×720) vs Default Media Receiver. -->
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #000;
      }
    </style>
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  </head>
  <body>
    <cast-media-player></cast-media-player>
    <script>
      const context = cast.framework.CastReceiverContext.getInstance();
      const playbackConfig = new cast.framework.PlaybackConfig();
      /* Bias ABR toward higher rungs on HLS/DASH (plain progressive MP4 is mostly “whatever file you loaded”). */
      playbackConfig.initialBandwidth = 12_000_000;
      context.start({ playbackConfig });
    </script>
  </body>
</html>

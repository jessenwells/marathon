<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cast receiver</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        --playback-logo-image: none;
      }
      cast-media-player {
        display: block;
        box-sizing: border-box;
        width: 100%;
        height: 100%;
        position: relative;
        --next-preview-visibility: hidden;
        --progress-color: rgba(0, 0, 0, 0);
        --watermark-image: none;
        --watermark-size: 0;
        --watermark-opacity: 0;
      }
    </style>
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  </head>
  <body>
    <cast-media-player></cast-media-player>
    <script>
      (function () {
        var PLAYER_SHADOW_CSS =
          "@-webkit-keyframes minimal-ui-spin { 0% { -webkit-transform: rotate(0deg); } 100% { -webkit-transform: rotate(360deg); } }" +
          "@keyframes minimal-ui-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }" +
          ".slideshow, .slideshow.active { display: none !important; }" +
          ".player .logo, .player .splash { color: transparent !important; font-size: 0 !important; }" +
          ".player .background { background-image: none !important; }" +
          "video.mediaElement, #castMediaElement { display: block !important; visibility: visible !important; opacity: 1 !important; }" +
          ".player[data-media-category='VIDEO'][data-state='loading'] .spinner," +
          ".player[data-media-category='VIDEO'][data-state='buffering'] .spinner," +
          ".player[data-minimal-spinner='true'] .spinner {" +
          "  display: block !important;" +
          "  visibility: visible !important;" +
          "  opacity: 1 !important;" +
          "  position: absolute !important;" +
          "  left: 50% !important;" +
          "  top: 50% !important;" +
          "  bottom: auto !important;" +
          "  right: auto !important;" +
          "  margin-left: -16px !important;" +
          "  margin-top: -16px !important;" +
          "  width: 32px !important;" +
          "  height: 32px !important;" +
          "  z-index: 1000 !important;" +
          "  -webkit-animation: minimal-ui-spin 1s infinite linear !important;" +
          "  animation: minimal-ui-spin 1s infinite linear !important;" +
          "}" +
          "video::cue, video::cue(v), ::cue, ::cue(v) {" +
          "  font-family: sans-serif !important;" +
          "  font-weight: 600 !important;" +
          "  color: #ffffff !important;" +
          "  background-color: transparent !important;" +
          "  background: transparent !important;" +
          "  text-shadow: 0 1px 3px rgba(0, 0, 0, 0.95), 0 0 8px rgba(0, 0, 0, 0.85) !important;" +
          "}";

        var OVERLAY_SHADOW_CSS =
          "#castControlsTimeline," +
          ".controlsTimeline," +
          "#castControlsProgress," +
          ".controlsProgress," +
          "#castControlsProgressInner," +
          ".controlsProgressInner," +
          "#castControlsSeekable," +
          ".controlsSeekable," +
          "#castControlsSeekablePlayed," +
          ".controlsSeekablePlayed," +
          ".controlsTimelineLabels," +
          "#castControlsCurTime," +
          ".controlsCurTime," +
          "#castControlsTotalTime," +
          ".controlsTotalTime," +
          ".videoLiveIndicator," +
          ".liveIndicator," +
          ".liveLabel," +
          ".progressBar," +
          '[class*="Progress"],' +
          '[class*="Timeline"],' +
          '[class*="CurTime"],' +
          '[class*="TotalTime"] {' +
          "  display: none !important;" +
          "  visibility: hidden !important;" +
          "  opacity: 0 !important;" +
          "  max-height: 0 !important;" +
          "  pointer-events: none !important;" +
          "}" +
          ".controls-metadata," +
          ".metadata," +
          ".media-metadata," +
          ".media-info," +
          ".info-container," +
          ".overlay-metadata," +
          ".overlay-text," +
          ".media-text," +
          ".title-container," +
          ".text-container," +
          ".media-title," +
          ".media-subtitle," +
          ".overlay-title," +
          ".overlay-subtitle," +
          ".title," +
          ".subtitle," +
          ".sub-title," +
          "#metadata," +
          "#overlay-title," +
          ".overlay-image," +
          ".thumbnail," +
          ".media-image," +
          "#overlay-image," +
          ".current-time," +
          ".duration," +
          ".time-label," +
          '[class*="time-label"],' +
          '[class*="metadata"],' +
          '[class*="thumbnail"],' +
          '[class*="Thumbnail"],' +
          '[class*="artwork"],' +
          '[class*="Artwork"] {' +
          "  display: none !important;" +
          "  visibility: hidden !important;" +
          "  opacity: 0 !important;" +
          "  pointer-events: none !important;" +
          "}" +
          ".next-up," +
          '[class*="next-preview"],' +
          '[class*="NextPreview"] {' +
          "  display: none !important;" +
          "}" +
          ".controls-play-pause," +
          ".play-pause," +
          '[class*="play-pause"],' +
          '[class*="PlayPause"] {' +
          "  display: block !important;" +
          "  visibility: visible !important;" +
          "  opacity: 1 !important;" +
          "}" +
          ":host([data-media-category='VIDEO'][data-state='buffering']) .gradient," +
          ":host([data-media-category='VIDEO'][data-state='paused'][data-display-status='false']) .gradient," +
          ":host([data-media-category='VIDEO'][data-state='loading']) .gradient," +
          ":host([data-media-category='VIDEO'][data-state='playing']) .gradient," +
          ":host([data-media-category='VIDEO'][data-state='paused']) .gradient," +
          ".tv-overlay[data-media-category='VIDEO'][data-state='buffering'] .gradient," +
          ".tv-overlay[data-media-category='VIDEO'][data-state='paused'][data-display-status='false'] .gradient," +
          ".gradient," +
          '[class*="gradient"] {' +
          "  display: none !important;" +
          "  visibility: hidden !important;" +
          "  opacity: 0 !important;" +
          "  pointer-events: none !important;" +
          "}";

        function applySubtitleStyle() {
          var ctx = cast.framework.CastReceiverContext.getInstance();
          var ttm = ctx.getPlayerManager().getTextTracksManager();
          if (!ttm || !cast.framework.messages) return;

          var msgs = cast.framework.messages;
          var style = new msgs.TextTrackStyle();
          style.fontGenericFamily = msgs.TextTrackFontGenericFamily.SANS_SERIF;
          style.fontFamily = "sans-serif";
          style.foregroundColor = "#FFFFFFFF";
          style.backgroundColor = "#00000000";
          style.windowType = msgs.TextTrackWindowType.NONE;
          style.windowColor = "#00000000";
          style.edgeType = msgs.TextTrackEdgeType.DROP_SHADOW;
          style.edgeColor = "#000000DD";
          style.fontStyle = msgs.TextTrackFontStyle.BOLD;
          style.fontScale = 1.0;

          try {
            ttm.setTextTrackStyle(style);
          } catch (e) {
            console.warn("[minimal-ui] setTextTrackStyle failed", e);
          }
        }

        function syncBufferingSpinner(playerData) {
          var player = document.querySelector("cast-media-player");
          if (!player || !player.shadowRoot) return;
          var castPlayer =
            player.shadowRoot.querySelector("#castPlayer") ||
            player.shadowRoot.querySelector(".player");
          if (!castPlayer) return;

          var show = false;
          var dataState = castPlayer.getAttribute("data-state");
          if (dataState === "loading" || dataState === "buffering") show = true;

          if (playerData && cast.framework.ui && cast.framework.ui.State) {
            var uiState = playerData.state;
            show =
              show ||
              uiState === cast.framework.ui.State.LOADING ||
              uiState === cast.framework.ui.State.BUFFERING;
          }

          if (show) castPlayer.setAttribute("data-minimal-spinner", "true");
          else castPlayer.removeAttribute("data-minimal-spinner");
        }

        function injectStyle(shadowRoot, styleId, css) {
          if (!shadowRoot) return false;
          var existing = shadowRoot.getElementById(styleId);
          if (existing) {
            existing.textContent = css;
            return true;
          }
          var style = document.createElement("style");
          style.id = styleId;
          style.textContent = css;
          shadowRoot.appendChild(style);
          return true;
        }

        function injectOverlayStyles(tvOverlay) {
          if (!tvOverlay || !tvOverlay.shadowRoot) return false;
          injectStyle(tvOverlay.shadowRoot, "minimal-ui-overlay", OVERLAY_SHADOW_CSS);
          var inner = tvOverlay.shadowRoot.querySelector("overlay, .overlay");
          if (inner && inner.shadowRoot) {
            injectStyle(inner.shadowRoot, "minimal-ui-overlay-inner", OVERLAY_SHADOW_CSS);
          }
          return true;
        }

        var playerData = {};

        function applyMinimalUi() {
          var player = document.querySelector("cast-media-player");
          if (!player || !player.shadowRoot) return false;

          injectStyle(player.shadowRoot, "minimal-ui-player", PLAYER_SHADOW_CSS);
          applySubtitleStyle();
          syncBufferingSpinner(playerData);

          var overlay = player.shadowRoot.querySelector("tv-overlay");
          if (!overlay) return false;
          return injectOverlayStyles(overlay);
        }

        function watchForMinimalUi() {
          var tries = 0;
          var timer = setInterval(function () {
            if (applyMinimalUi() || ++tries > 300) clearInterval(timer);
          }, 100);
        }

        function observePlayerShadow() {
          var player = document.querySelector("cast-media-player");
          if (!player) return;

          function attachObserver() {
            if (!player.shadowRoot) return;
            applyMinimalUi();
            new MutationObserver(function () {
              syncBufferingSpinner(playerData);
              applyMinimalUi();
            }).observe(player.shadowRoot, { childList: true, subtree: true });
            var castPlayer = player.shadowRoot.querySelector("#castPlayer, .player");
            if (castPlayer) {
              new MutationObserver(function () {
                syncBufferingSpinner(playerData);
              }).observe(castPlayer, {
                attributes: true,
                attributeFilter: ["data-state"],
              });
            }
            var tvOverlay = player.shadowRoot.querySelector("tv-overlay");
            if (tvOverlay) {
              new MutationObserver(function () {
                applyMinimalUi();
              }).observe(tvOverlay, {
                attributes: true,
                attributeFilter: ["data-state", "data-display-status"],
              });
            }
          }

          if (player.shadowRoot) attachObserver();
          else customElements.whenDefined("cast-media-player").then(attachObserver);
        }

        var ctx = cast.framework.CastReceiverContext.getInstance();
        ctx.addEventListener(cast.framework.system.EventType.READY, applySubtitleStyle);
        ctx.start();
        watchForMinimalUi();
        observePlayerShadow();

        if (cast.framework.ui && cast.framework.ui.PlayerDataBinder) {
          var binder = new cast.framework.ui.PlayerDataBinder(playerData);
          binder.addEventListener(
            cast.framework.ui.PlayerDataEventType.STATE_CHANGED,
            function () {
              syncBufferingSpinner(playerData);
              applyMinimalUi();
            }
          );
        }

        var pm = ctx.getPlayerManager();

        // Progressive MP4 cannot use a second media element while playing, but
        // we can warm DNS/TLS and cache the file head before the handoff.
        var warmedUrls = {};
        var WARM_LEAD_SEC = 120;
        var WARM_BYTES = 2 * 1024 * 1024;

        function getNextItemMediaUrl(queueManager) {
          var items = queueManager.getItems();
          var current = queueManager.getCurrentItem();
          if (!items || !current) return null;
          for (var i = 0; i < items.length; i++) {
            if (items[i].itemId === current.itemId && i + 1 < items.length) {
              var media = items[i + 1].media;
              return (media && (media.contentUrl || media.contentId)) || null;
            }
          }
          return null;
        }

        function warmMp4Head(url) {
          if (!url || warmedUrls[url]) return;
          warmedUrls[url] = true;
          fetch(url, {
            method: "GET",
            headers: { Range: "bytes=0-" + (WARM_BYTES - 1) },
          })
            .then(function () {
              console.info("[marathon-warm] prefetched head");
            })
            .catch(function (err) {
              console.warn("[marathon-warm] prefetch failed", err);
              delete warmedUrls[url];
            });
        }

        function warmNextInQueue() {
          var qm = pm.getQueueManager();
          if (!qm) return;
          var nextUrl = getNextItemMediaUrl(qm);
          if (nextUrl) warmMp4Head(nextUrl);
        }

        function maybeWarmNearChapterEnd() {
          var duration = pm.getDurationSec();
          var currentTime = pm.getCurrentTimeSec();
          if (!duration || duration <= 0) return;
          if (duration - currentTime > WARM_LEAD_SEC) return;
          warmNextInQueue();
        }

        pm.addEventListener(
          cast.framework.events.EventType.QUEUE_CHANGED,
          function () {
            warmedUrls = {};
            warmNextInQueue();
          }
        );
        pm.addEventListener(cast.framework.events.EventType.TIME_UPDATE, function () {
          maybeWarmNearChapterEnd();
        });
        pm.addEventListener(
          cast.framework.events.EventType.PLAYER_LOAD_COMPLETE,
          function () {
            applySubtitleStyle();
            syncBufferingSpinner(playerData);
            warmNextInQueue();
          }
        );
        pm.addEventListener(cast.framework.events.EventType.BUFFERING, function () {
          syncBufferingSpinner(playerData);
        });
        pm.addEventListener(cast.framework.events.EventType.BUFFERED, function () {
          syncBufferingSpinner(playerData);
        });
      })();
    </script>
  </body>
</html>

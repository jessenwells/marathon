<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cast receiver</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000;
      }
      cast-media-player {
        display: block;
        width: 100%;
        height: 100%;
        position: relative;
      }
    </style>
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  </head>
  <body>
    <cast-media-player></cast-media-player>
    <script>
      /*
        Aspect fix (some Chromecast + cast-media-player builds distort <video>
        when it is boxed with width and height both 100%). Together:
        — Shadow CSS: max-width/max-height + object-fit:contain + auto w/h,
          wrappers full viewport + flex center.
        — loadedmetadata: aspect-ratio from videoWidth / videoHeight.
      */
      (function () {
      cast.framework.CastReceiverContext.getInstance().start();
      })();
    </script>
  </body>
</html>

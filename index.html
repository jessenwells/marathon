<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cast receiver</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        --playback-logo-image: none;
      }
      cast-media-player {
        display: block;
        box-sizing: border-box;
        width: 100%;
        height: 100%;
        position: relative;
        --next-preview-visibility: hidden;
        --progress-color: rgba(0, 0, 0, 0);
        --watermark-image: none;
        --watermark-size: 0;
        --watermark-opacity: 0;
      }
    </style>
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <!-- Set false before production. Ultra often blocks chrome://inspect :9222 — use this + CaC tool instead. -->
    <script>
      var DEBUG_RECEIVER = true;
    </script>
    <script src="https://www.gstatic.com/cast/sdk/libs/devtools/debug_layer/caf_receiver_logger.js"></script>
  </head>
  <body>
    <cast-media-player></cast-media-player>
    <script>
      (function () {
        var LOG_TAG = "minimal-ui";
        var castDebugLogger =
          typeof cast !== "undefined" &&
          cast.debug &&
          cast.debug.CastDebugLogger
            ? cast.debug.CastDebugLogger.getInstance()
            : null;

        function log(level, message) {
          if (!castDebugLogger || !DEBUG_RECEIVER) return;
          castDebugLogger[level](LOG_TAG, message);
        }

        function injectMinimalPlayerChrome(player) {
          if (!player || !player.shadowRoot) return false;
          if (player.shadowRoot.querySelector("#minimal-ui-style")) return true;

          var style = document.createElement("style");
          style.id = "minimal-ui-style";
          style.textContent =
            ".controls-progress," +
            ".controls-timeline," +
            "#progress," +
            ".progress-bar," +
            '[class*="progress"] {' +
            "  opacity: 0 !important;" +
            "  visibility: hidden !important;" +
            "  pointer-events: none !important;" +
            "  max-height: 0 !important;" +
            "}" +
            ".overlay-text," +
            ".media-text," +
            ".media-metadata," +
            ".title-overlay," +
            ".overlay-metadata," +
            ".media-title," +
            ".overlay-title," +
            "#metadata," +
            "#overlay-title," +
            ".overlay-image," +
            ".thumbnail," +
            ".media-image," +
            "#overlay-image," +
            ".current-time," +
            ".duration," +
            ".time-label," +
            '[class*="time-label"] {' +
            "  display: none !important;" +
            "}" +
            ".next-up," +
            '[class*="next-preview"],' +
            '[class*="NextPreview"] {' +
            "  display: none !important;" +
            "}";

          player.shadowRoot.appendChild(style);
          log("info", "minimal-ui style injected into shadow root");
          return true;
        }

        function watchForPlayerElement() {
          var tries = 0;
          var timer = setInterval(function () {
            var player = document.querySelector("cast-media-player");
            if (player && player.shadowRoot) {
              if (injectMinimalPlayerChrome(player)) {
                clearInterval(timer);
              }
            }
            if (++tries > 100) {
              log("warn", "cast-media-player shadow root not found after 10s");
              clearInterval(timer);
            }
          }, 100);
        }

        var ctx = cast.framework.CastReceiverContext.getInstance();

        if (DEBUG_RECEIVER && castDebugLogger) {
          ctx.addEventListener(cast.framework.system.EventType.READY, function () {
            if (!castDebugLogger.debugOverlayElement_) {
              castDebugLogger.setEnabled(true);
              castDebugLogger.showDebugLogs(true);
            }
            log("info", "receiver READY — remote :9222 may be unavailable on this device");
          });
        }

        ctx.start();

        if (cast.framework.ui && cast.framework.ui.PlayerDataBinder) {
          var playerData = {};
          var binder = new cast.framework.ui.PlayerDataBinder(playerData);
          binder.addEventListener(
            cast.framework.ui.PlayerDataEventType.STATE_CHANGED,
            function () {
              injectMinimalPlayerChrome(
                document.querySelector("cast-media-player")
              );
            }
          );
        }

        watchForPlayerElement();
      })();
    </script>
  </body>
</html>

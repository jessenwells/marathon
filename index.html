<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cast receiver</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      /*
        Custom elements default to `display: inline`, which breaks percentage
        sizing and can make the shadow-DOM video stretch to wrong dimensions.
      */
      cast-media-player {
        display: block;
        box-sizing: border-box;
        width: 100%;
        height: 100%;
        overflow: hidden;
        /*
          Some builds size the playback slot as a flex child; anchor full area
          so inner shells get a sane containing block for % heights.
        */
        position: relative;
        /*
          Hide queue "your video will play in …" countdown. Variable is
          undocumented in Google's public styling table but referenced by CAST
          engineers on Stack Overflow; verify with chromecast://inspect if empty.
        */
        --next-preview-visibility: hidden;
      }
    </style>
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  </head>
  <body>
    <cast-media-player></cast-media-player>
    <!--
      Receiver IDs (not source code — these are hosted apps): CC1AD845 is
      Google's Default Media Web Receiver (closed source). FFE417E5 is Bitmovin's
      CAF v3 demo; C899A03E is Radiant Media Player's CAF receiver. For Google's
      UX with CSS-only branding use "Styled Media Receiver" in Cast Console plus
      an external stylesheet: https://developers.google.com/cast/docs/styled_receiver
    -->
    <script>
      (function () {
        /**
         * Optional receiver-side queue / buffering tuning:
         * preloadTime applies to QUEUE_* messages (receiver tries to honour it).
         * https://developers.google.com/cast/docs/web_receiver/advanced#content-preload
         * Negative preloadTime disables preload for those items per QueueItem docs.
         */
        var RECEIVER_QUEUE_PRELOAD_SECONDS = undefined;

        /**
         * If true, rewrite incoming QUEUE_LOAD / QUEUE_INSERT / QUEUE_UPDATE
         * items so autoplay is always true.
         */
        var RECEIVER_QUEUE_FORCE_AUTOPLAY = false;

        /**
         * PlaybackConfig buffer thresholds within a single item (not cross-queue preload).
         * https://developers.google.com/cast/docs/reference/web_receiver/cast.framework.PlaybackConfig
         */
        var RECEIVER_PLAYBACK_AUTOPAUSE_BUFFER_SEC = undefined;
        var RECEIVER_PLAYBACK_AUTORESUME_BUFFER_SEC = undefined;

        function buildReceiverStartOptionsOrNull() {
          var tunePause =
            typeof RECEIVER_PLAYBACK_AUTOPAUSE_BUFFER_SEC === "number";
          var tuneResume =
            typeof RECEIVER_PLAYBACK_AUTORESUME_BUFFER_SEC === "number";
          if (!tunePause && !tuneResume) return null;
          var opts = new cast.framework.CastReceiverOptions();
          opts.playbackConfig = new cast.framework.PlaybackConfig();
          if (tunePause)
            opts.playbackConfig.autoPauseDuration =
              RECEIVER_PLAYBACK_AUTOPAUSE_BUFFER_SEC;
          if (tuneResume)
            opts.playbackConfig.autoResumeDuration =
              RECEIVER_PLAYBACK_AUTORESUME_BUFFER_SEC;
          return opts;
        }

        function registerQueueMessageInterceptors() {
          var usePreload =
            typeof RECEIVER_QUEUE_PRELOAD_SECONDS === "number";
          if (!usePreload && !RECEIVER_QUEUE_FORCE_AUTOPLAY) return;

          function patchQueueItems(items) {
            if (!items || !items.length) return;
            var i;

            if (typeof RECEIVER_QUEUE_PRELOAD_SECONDS === "number")
              for (i = 0; i < items.length; i++) {
                if (items[i])
                  items[i].preloadTime = RECEIVER_QUEUE_PRELOAD_SECONDS;
              }

            if (RECEIVER_QUEUE_FORCE_AUTOPLAY)
              for (i = 0; i < items.length; i++) {
                if (items[i]) items[i].autoplay = true;
              }
          }

          function interceptor(requestData) {
            if (requestData && requestData.items)
              patchQueueItems(requestData.items);
            return requestData;
          }

          var ctx = cast.framework.CastReceiverContext.getInstance();
          var pm = ctx.getPlayerManager();
          var Mt = cast.framework.messages.MessageType;
          pm.setMessageInterceptor(Mt.QUEUE_LOAD, interceptor);
          pm.setMessageInterceptor(Mt.QUEUE_INSERT, interceptor);
          pm.setMessageInterceptor(Mt.QUEUE_UPDATE, interceptor);
        }

        registerQueueMessageInterceptors();

        /*
          Aggressive sizing: pinning both width AND height on <video> to the slot
          can still yield fill-like stretching on some Chromecast builds. Prefer
          max constraints + intrinsic aspect-ratio from loadedmetadata handler.
          Also normalize common CAF/Shaka wrappers (class names vary by FW).
        */
        var ASPECT_CSS = [
          "[class*=video-container],",
          "[class*=embed-player],",
          "[class*=shaka-video-container]{",
          "display:flex!important;",
          "align-items:center!important;",
          "justify-content:center!important;",
          "}",
          "video{",
          "object-fit:contain!important;",
          "object-position:center!important;",
          "width:auto!important;",
          "height:auto!important;",
          "max-width:100%!important;",
          "max-height:100%!important;",
          "}",
        ].join("");

        function ensureAspectStyleInShadow(shadowRoot) {
          if (!shadowRoot) return;
          var marker = "[data-cast-rcv-contain]";
          var el = shadowRoot.querySelector(marker);
          if (!el) {
            el = document.createElement("style");
            el.setAttribute("data-cast-rcv-contain", "1");
            shadowRoot.insertBefore(el, shadowRoot.firstChild);
          }
          el.textContent = ASPECT_CSS;
        }

        function attachVideoIntrinsicAspectHint(video) {
          if (!video || video.__castRcAspectBound) return;
          video.__castRcAspectBound = true;

          function applyFromDecodedDimensions() {
            var w = video.videoWidth;
            var h = video.videoHeight;
            if (!w || !h) return;
            /*
              Gives the replaced element box the stream's pixel aspect before
              max-* clamping (helps when parent flex layout collapses odd heights).
            */
            video.style.aspectRatio = w + " / " + h;
          }

          video.addEventListener("loadedmetadata", applyFromDecodedDimensions);
          video.addEventListener("emptied", function () {
            video.style.aspectRatio = "";
          });
          if (video.readyState >= 1) applyFromDecodedDimensions();
        }

        function walkOpenShadowTrees(shadowRoot, visit) {
          if (!shadowRoot) return;
          visit(shadowRoot);
          shadowRoot.querySelectorAll("*").forEach(function (node) {
            if (node.shadowRoot) {
              walkOpenShadowTrees(node.shadowRoot, visit);
            }
          });
        }

        function patchCastMediaPlayerSubtree() {
          var player = document.querySelector("cast-media-player");
          if (!player || !player.shadowRoot) return;
          walkOpenShadowTrees(player.shadowRoot, function (shadow) {
            ensureAspectStyleInShadow(shadow);
            shadow.querySelectorAll("video").forEach(function (video) {
              video.style.objectFit = "contain";
              video.style.objectPosition = "center center";
              video.style.maxWidth = "100%";
              video.style.maxHeight = "100%";
              attachVideoIntrinsicAspectHint(video);
            });
          });
        }

        function watchCastMediaPlayerOuter(root) {
          function patch() {
            patchCastMediaPlayerSubtree();
          }
          patch();
          new MutationObserver(patch).observe(root, {
            subtree: true,
            childList: true,
          });
        }

        function attachOuterWhenReady(el) {
          if (el.shadowRoot) {
            watchCastMediaPlayerOuter(el.shadowRoot);
            return;
          }
          requestAnimationFrame(function () {
            attachOuterWhenReady(el);
          });
        }

        var player = document.querySelector("cast-media-player");
        if (player) {
          attachOuterWhenReady(player);
        }

        /** Re-patch after loads (Shaka / inner shells mount late vs first paint). */
        function hookPlayerManager() {
          var ctx = cast.framework.CastReceiverContext.getInstance();
          var pm = ctx.getPlayerManager();
          var Et = cast.framework.events.EventType;
          function schedulePatch() {
            requestAnimationFrame(function () {
              setTimeout(patchCastMediaPlayerSubtree, 0);
            });
          }
          pm.addEventListener(Et.PLAYER_LOADING, schedulePatch);
          pm.addEventListener(Et.PLAYER_LOAD_COMPLETE, schedulePatch);
          pm.addEventListener(Et.PLAYING, schedulePatch);
        }

        hookPlayerManager();

        /** Short burst in case MutationObserver misses a closed-upgrade path. */
        for (var j = 1; j <= 24; j++) {
          setTimeout(patchCastMediaPlayerSubtree, j * 150);
        }

        var receiverOpts = buildReceiverStartOptionsOrNull();
        var context = cast.framework.CastReceiverContext.getInstance();
        if (receiverOpts) context.start(receiverOpts);
        else context.start();
      })();
    </script>
  </body>
</html>

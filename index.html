<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cast receiver</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        --playback-logo-image: none;
      }
      cast-media-player {
        display: block;
        box-sizing: border-box;
        width: 100%;
        height: 100%;
        position: relative;
        --next-preview-visibility: hidden;
        --progress-color: rgba(0, 0, 0, 0);
        --watermark-image: none;
        --watermark-size: 0;
        --watermark-opacity: 0;
      }
    </style>
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  </head>
  <body>
    <cast-media-player></cast-media-player>
    <script>
      (function () {
        var PLAYER_SHADOW_CSS =
          ".slideshow, .slideshow.active { display: none !important; }" +
          ".player .logo, .player .splash { color: transparent !important; font-size: 0 !important; }" +
          ".player .background { background-image: none !important; }" +
          "video.mediaElement, #castMediaElement { display: block !important; visibility: visible !important; opacity: 1 !important; }";

        var OVERLAY_SHADOW_CSS =
          ".controls-progress," +
          ".controls-progress-inner," +
          ".controls-progress-thumb," +
          ".controls-timeline," +
          ".progressBar," +
          ".progress-bar," +
          "#progress," +
          '[class*="progress"] {' +
          "  display: none !important;" +
          "  visibility: hidden !important;" +
          "  opacity: 0 !important;" +
          "  max-height: 0 !important;" +
          "  pointer-events: none !important;" +
          "}" +
          ".controls-metadata," +
          ".metadata," +
          ".media-metadata," +
          ".media-info," +
          ".info-container," +
          ".overlay-metadata," +
          ".overlay-text," +
          ".media-text," +
          ".title-container," +
          ".text-container," +
          ".media-title," +
          ".media-subtitle," +
          ".overlay-title," +
          ".overlay-subtitle," +
          ".title," +
          ".subtitle," +
          ".sub-title," +
          "#metadata," +
          "#overlay-title," +
          ".overlay-image," +
          ".thumbnail," +
          ".media-image," +
          "#overlay-image," +
          ".current-time," +
          ".duration," +
          ".time-label," +
          '[class*="time-label"],' +
          '[class*="metadata"],' +
          '[class*="thumbnail"],' +
          '[class*="Thumbnail"],' +
          '[class*="artwork"],' +
          '[class*="Artwork"] {' +
          "  display: none !important;" +
          "  visibility: hidden !important;" +
          "  opacity: 0 !important;" +
          "  pointer-events: none !important;" +
          "}" +
          ".next-up," +
          '[class*="next-preview"],' +
          '[class*="NextPreview"] {' +
          "  display: none !important;" +
          "}" +
          ".controls-play-pause," +
          ".play-pause," +
          '[class*="play-pause"],' +
          '[class*="PlayPause"] {' +
          "  display: block !important;" +
          "  visibility: visible !important;" +
          "  opacity: 1 !important;" +
          "}";

        function injectStyle(shadowRoot, styleId, css) {
          if (!shadowRoot) return false;
          if (shadowRoot.getElementById(styleId)) return true;
          var style = document.createElement("style");
          style.id = styleId;
          style.textContent = css;
          shadowRoot.appendChild(style);
          return true;
        }

        function applyMinimalUi() {
          var player = document.querySelector("cast-media-player");
          if (!player || !player.shadowRoot) return false;

          injectStyle(player.shadowRoot, "minimal-ui-player", PLAYER_SHADOW_CSS);

          var overlay = player.shadowRoot.querySelector("tv-overlay");
          if (!overlay || !overlay.shadowRoot) return false;

          injectStyle(overlay.shadowRoot, "minimal-ui-overlay", OVERLAY_SHADOW_CSS);
          return true;
        }

        function watchForMinimalUi() {
          var tries = 0;
          var timer = setInterval(function () {
            if (applyMinimalUi() || ++tries > 300) clearInterval(timer);
          }, 100);
        }

        function observePlayerShadow() {
          var player = document.querySelector("cast-media-player");
          if (!player) return;

          function attachObserver() {
            if (!player.shadowRoot) return;
            applyMinimalUi();
            new MutationObserver(function () {
              applyMinimalUi();
            }).observe(player.shadowRoot, { childList: true, subtree: true });
          }

          if (player.shadowRoot) attachObserver();
          else customElements.whenDefined("cast-media-player").then(attachObserver);
        }

        var ctx = cast.framework.CastReceiverContext.getInstance();
        ctx.start();
        watchForMinimalUi();
        observePlayerShadow();

        if (cast.framework.ui && cast.framework.ui.PlayerDataBinder) {
          var playerData = {};
          var binder = new cast.framework.ui.PlayerDataBinder(playerData);
          binder.addEventListener(
            cast.framework.ui.PlayerDataEventType.STATE_CHANGED,
            applyMinimalUi
          );
        }
      })();
    </script>
  </body>
</html>

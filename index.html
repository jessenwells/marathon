<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Cast receiver</title>
    <style>
      /* Custom elements default to display:inline; without block + height chain the
         player box can layout wrong (distorted / soft) vs Default Media Receiver. */
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100vh;
        overflow: hidden;
        /* Distinctive tint so you can tell this deploy is live (letterbox + idle UI). */
        background: #0f1729;
      }
      cast-media-player {
        display: block;
        width: 100%;
        height: 100vh;
        --background-color: #0f1729;
      }
    </style>
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  </head>
  <body>
    <cast-media-player></cast-media-player>
    <script>
      /* No CastReceiverOptions / PlaybackConfig — matches Default Media Receiver CAF defaults.
         A sparse PlaybackConfig passed to start() can drop merged defaults and hurt ABR / scaling. */
      cast.framework.CastReceiverContext.getInstance().start();
    </script>
  </body>
</html>
